    const { useState, useCallback, useEffect, useRef } = React;

    /* ── Gmail OAuth ── */
    const GMAIL_CLIENT_ID = "307432189627-58st09frfpui6cepdoij4mv4qil3s6bj.apps.googleusercontent.com";
    const GMAIL_SENDER    = "maths.perriand@gmail.com";
    const GMAIL_SCOPE     = "https://www.googleapis.com/auth/gmail.send";

    let gmailAccessToken = null;

    function getGmailToken() {
      return new Promise((resolve, reject) => {
        if (gmailAccessToken) { resolve(gmailAccessToken); return; }
        if (!window.google?.accounts?.oauth2) {
          reject(new Error("Google Identity Services non chargé")); return;
        }
        const client = window.google.accounts.oauth2.initTokenClient({
          client_id: GMAIL_CLIENT_ID,
          scope: GMAIL_SCOPE,
          login_hint: GMAIL_SENDER,
          prompt: "consent",
          callback: (resp) => {
            if (resp.error) { reject(new Error(resp.error)); return; }
            gmailAccessToken = resp.access_token;
            setTimeout(() => { gmailAccessToken = null; }, (resp.expires_in - 60) * 1000);
            resolve(gmailAccessToken);
          },
          error_callback: (err) => {
            reject(new Error(err.type || "Autorisation refusée"));
          }
        });
        client.requestAccessToken();
      });
    }

    // Fusionne plusieurs PDFs base64 en un seul
    async function mergePdfs(pdfList) {
      if (pdfList.length === 1) return pdfList[0].b64;
      const { PDFDocument } = window.PDFLib;
      const merged = await PDFDocument.create();
      for (const p of pdfList) {
        const bytes = Uint8Array.from(atob(p.b64), c => c.charCodeAt(0));
        const doc   = await PDFDocument.load(bytes);
        const pages = await merged.copyPages(doc, doc.getPageIndices());
        pages.forEach(pg => merged.addPage(pg));
      }
      const bytes = await merged.save();
      return btoa(String.fromCharCode(...bytes));
    }

    // Encode en base64url
    function b64url(str) {
      return btoa(unescape(encodeURIComponent(str)))
        .replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
    }

    // Construit un message MIME simple (sans pièce jointe)
    function buildMime(to, subject, body) {
      const msg = [
        `From: ${GMAIL_SENDER}`,
        `To: ${to}`,
        `Subject: =?UTF-8?B?${btoa(unescape(encodeURIComponent(subject)))}?=`,
        "MIME-Version: 1.0",
        "Content-Type: text/plain; charset=utf-8",
        "Content-Transfer-Encoding: base64",
        "",
        btoa(unescape(encodeURIComponent(body)))
      ].join("\r\n");
      return b64url(msg);
    }

    // Construit un message MIME multipart (avec pièce jointe PDF)
    function buildMimeWithPdf(to, subject, body, pdfBase64, pdfFilename) {
      const boundary = "boundary_" + Math.random().toString(36).slice(2);
      const parts = [
        `From: ${GMAIL_SENDER}`,
        `To: ${to}`,
        `Subject: =?UTF-8?B?${btoa(unescape(encodeURIComponent(subject)))}?=`,
        "MIME-Version: 1.0",
        `Content-Type: multipart/mixed; boundary="${boundary}"`,
        "",
        `--${boundary}`,
        "Content-Type: text/plain; charset=utf-8",
        "Content-Transfer-Encoding: base64",
        "",
        btoa(unescape(encodeURIComponent(body))),
        "",
        `--${boundary}`,
        `Content-Type: application/pdf; name="${pdfFilename}"`,
        "Content-Transfer-Encoding: base64",
        `Content-Disposition: attachment; filename="${pdfFilename}"`,
        "",
        pdfBase64,
        "",
        `--${boundary}--`
      ].join("\r\n");
      return b64url(parts);
    }

    // Envoie via Gmail API
    async function sendGmail(to, subject, body, pdfBase64=null, pdfFilename=null) {
      const token = await getGmailToken();
      const raw   = pdfBase64
        ? buildMimeWithPdf(to, subject, body, pdfBase64, pdfFilename)
        : buildMime(to, subject, body);
      const res = await fetch("https://gmail.googleapis.com/gmail/v1/users/me/messages/send", {
        method: "POST",
        headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
        body: JSON.stringify({ raw }),
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error?.message || "Erreur Gmail");
      }
    }

    /* ── Gestionnaire de sessions ── */
    const ROOT = "prof_maths_sessions";
    const ACTIVE_KEY = "prof_maths_active";

    function getAllSessions() {
      try { return JSON.parse(localStorage.getItem(ROOT) || "{}"); } catch { return {}; }
    }
    function saveSession(id, data) {
      const all = getAllSessions(); all[id] = data; localStorage.setItem(ROOT, JSON.stringify(all));
    }
    function getSession(id) {
      return getAllSessions()[id] || {};
    }
    function deleteSession(id) {
      const all = getAllSessions(); delete all[id]; localStorage.setItem(ROOT, JSON.stringify(all));
      if (localStorage.getItem(ACTIVE_KEY) === id) localStorage.removeItem(ACTIVE_KEY);
    }
    function getActiveId() {
      return localStorage.getItem(ACTIVE_KEY) || null;
    }
    function setActiveId(id) {
      localStorage.setItem(ACTIVE_KEY, id);
    }
    function newSessionId() {
      return "s_" + Date.now();
    }

    /* ── API Claude ── */
    async function callClaude(apiKey, messages, system) {
      const body = { model: "claude-sonnet-4-6", max_tokens: 2000, messages };
      if (system) body.system = system;
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      return data.content?.map(b => b.text || "").join("") || "";
    }

    /* ── Élèves ── */
    function parseStudents(raw) {
      return raw.trim().split("\n").filter(Boolean).map((line, i) => {
        const [name, email] = line.split(",").map(s => s.trim());
        return { id: i, name: name || `Élève ${i+1}`, email: email || "" };
      });
    }

    /* ── Découpe PDF ── */
    async function extractPdfPages(pdfBase64, pageStart, pageEnd) {
      const { PDFDocument } = window.PDFLib;
      const src = Uint8Array.from(atob(pdfBase64), c => c.charCodeAt(0));
      const srcDoc = await PDFDocument.load(src);
      const newDoc = await PDFDocument.create();
      const idx = Array.from({ length: pageEnd - pageStart + 1 }, (_, i) => pageStart - 1 + i);
      const copied = await newDoc.copyPages(srcDoc, idx);
      copied.forEach(p => newDoc.addPage(p));
      const bytes = await newDoc.save();
      return btoa(String.fromCharCode(...bytes));
    }

    /* ── LaTeX → HTML ── */
    function latexToHtml(src) {
      if (!window.katex) return `<pre>${src}</pre>`;
      let html = src
        .replace(/\$\$([\s\S]+?)\$\$/g, (_, m) => {
          try { return `<div style="margin:12px 0;text-align:center">${window.katex.renderToString(m, { displayMode:true, throwOnError:false })}</div>`; }
          catch { return `<div>$$${m}$$</div>`; }
        })
        .replace(/\$([^\$\n]+?)\$/g, (_, m) => {
          try { return window.katex.renderToString(m, { displayMode:false, throwOnError:false }); }
          catch { return `$${m}$`; }
        });
      html = html
        .replace(/\\begin\{center\}([\s\S]*?)\\end\{center\}/g, '<div style="text-align:center">$1</div>')
        .replace(/\\textbf\{([^}]+)\}/g, '<strong>$1</strong>')
        .replace(/\\textit\{([^}]+)\}/g, '<em>$1</em>')
        .replace(/\\underline\{([^}]+)\}/g, '<u>$1</u>')
        .replace(/\{\\Large\\textbf\{([^}]+)\}\}/g, '<h1 style="font-size:16pt;text-align:center;margin:12px 0">$1</h1>')
        .replace(/\\section\*?\{([^}]+)\}/g, '<h2 style="font-size:13pt;margin-top:20px;margin-bottom:8px">$1</h2>')
        .replace(/\\subsection\*?\{([^}]+)\}/g, '<h3 style="font-size:12pt;margin-top:12px">$1</h3>')
        .replace(/\\begin\{enumerate\}([\s\S]*?)\\end\{enumerate\}/g, (_, body) =>
          `<ol style="padding-left:24px;margin:8px 0">${body.replace(/\\item\s+/g,'<li>').replace(/<li>([^<]*)/g,'<li>$1</li>')}</ol>`)
        .replace(/\\begin\{itemize\}([\s\S]*?)\\end\{itemize\}/g, (_, body) =>
          `<ul style="padding-left:24px;margin:8px 0">${body.replace(/\\item\s+/g,'<li>').replace(/<li>([^<]*)/g,'<li>$1</li>')}</ul>`)
        .replace(/\\hfill/g, '<span style="float:right">')
        .replace(/\\\\(\[[\d.]+pt\])?/g, '<br/>')
        .replace(/\\vspace\{[^}]+\}/g, '<div style="height:10px"></div>')
        .replace(/\\newline/g, '<br/>')
        .replace(/\\hline/g, '')
        .replace(/\\[a-zA-Z]+\{([^}]*)\}/g, '$1')
        .replace(/\\[a-zA-Z]+/g, '')
        .replace(/\n{2,}/g, '</p><p style="margin:6px 0">');
      return '<p style="margin:6px 0">' + html + '</p>';
    }

    /* ── Micro-composants ── */
    function Card({ children }) {
      return <div style={{ background:"#fff", border:"0.5px solid #e5e7eb", borderRadius:10, padding:"1.25rem", marginBottom:"1rem" }}>{children}</div>;
    }
    function Field({ label, children }) {
      return <div style={{ marginBottom:4 }}><span style={{ display:"block", fontSize:13, color:"#6b7280", marginBottom:6 }}>{label}</span>{children}</div>;
    }
    function SectionHead({ title, right }) {
      return (
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
          <span style={{ fontSize:14, fontWeight:500 }}>{title}</span>
          {right}
        </div>
      );
    }
    function Bdg({ color, children }) {
      const m = { success:["#dcfce7","#16a34a"], danger:["#fee2e2","#dc2626"], info:["#dbeafe","#1d4ed8"] };
      const [bg,tc] = m[color]||m.info;
      return <span style={{ fontSize:11, fontWeight:500, padding:"3px 10px", borderRadius:6, background:bg, color:tc }}>{children}</span>;
    }

    /* ════════════════════════════════════════════════════════
       APPLICATION
    ════════════════════════════════════════════════════════ */
    /* ════ SessionManager ════ */
    function SessionManager({ onSelect }) {
      const [sessions, setSessions] = useState(() => getAllSessions());
      const [newName,  setNewName]  = useState("");

      const refresh = () => setSessions(getAllSessions());

      const create = () => {
        const name = newName.trim() || "Devoir du " + new Date().toLocaleDateString("fr-FR");
        const id = newSessionId();
        saveSession(id, { name, createdAt: Date.now() });
        setNewName(""); refresh(); onSelect(id, name);
      };

      const open = (id) => {
        const s = getAllSessions()[id];
        onSelect(id, s.name);
      };

      const del = (id, e) => {
        e.stopPropagation();
        if (window.confirm("Supprimer ce devoir et toutes ses données ?")) {
          deleteSession(id); refresh();
        }
      };

      const entries = Object.entries(sessions).sort((a,b) => (b[1].createdAt||0)-(a[1].createdAt||0));
      const lastId  = getActiveId();
      const lastSession = lastId && sessions[lastId] ? sessions[lastId] : null;

      return (
        <div style={{ maxWidth:700, margin:"0 auto", padding:"2rem 1rem" }}>
          <h1 style={{ marginBottom:8 }}>📐 Gestionnaire de devoirs</h1>
          <p style={{ fontSize:13, color:"#6b7280", marginBottom:"1.5rem" }}>Chaque devoir est indépendant — ouvrez-en plusieurs dans des onglets différents.</p>

          {/* Reprendre le dernier devoir */}
          {lastSession && (
            <div style={{ background:"#dbeafe", border:"0.5px solid #93c5fd", borderRadius:10, padding:"14px 16px", marginBottom:16, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div>
                <div style={{ fontSize:12, color:"#1d4ed8", marginBottom:2 }}>Dernier devoir ouvert</div>
                <div style={{ fontWeight:500 }}>{lastSession.name}</div>
              </div>
              <button onClick={()=>onSelect(lastId, lastSession.name)} style={{ background:"#1d4ed8", border:"none", flexShrink:0 }}>
                Reprendre →
              </button>
            </div>
          )}

          {/* Nouveau devoir */}
          <Card>
            <div style={{ fontSize:14, fontWeight:500, marginBottom:10 }}>➕ Nouveau devoir</div>
            <div style={{ display:"flex", gap:8 }}>
              <input type="text" value={newName} onChange={e=>setNewName(e.target.value)}
                placeholder="Ex : Terminale – Suites – Jan 2025"
                onKeyDown={e=>e.key==="Enter"&&create()}
                style={{ flex:1 }}/>
              <button onClick={create} style={{ flexShrink:0 }}>Créer</button>
            </div>
          </Card>

          {/* Liste des devoirs existants */}
          {entries.length > 0 && (
            <Card>
              <div style={{ fontSize:14, fontWeight:500, marginBottom:10 }}>📂 Devoirs existants</div>
              {entries.map(([id, s]) => (
                <div key={id} onClick={()=>open(id)} style={{
                  display:"flex", justifyContent:"space-between", alignItems:"center",
                  padding:"10px 12px", marginBottom:6, borderRadius:8, cursor:"pointer",
                  background:"#f3f4f6", border:"0.5px solid #e5e7eb",
                  transition:"background 0.15s",
                }} onMouseEnter={e=>e.currentTarget.style.background="#e5e7eb"}
                   onMouseLeave={e=>e.currentTarget.style.background="#f3f4f6"}>
                  <div>
                    <div style={{ fontWeight:500, fontSize:14 }}>{s.name}</div>
                    <div style={{ fontSize:11, color:"#9ca3af" }}>
                      {s.createdAt ? new Date(s.createdAt).toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"}) : ""}
                      {s.step > 0 ? ` — Étape ${s.step+1}/4` : ""}
                      {s.corrections?.length > 0 ? ` — ${s.corrections.filter(c=>!c.skipped).length} copie(s) corrigée(s)` : ""}
                    </div>
                  </div>
                  <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                    <span style={{ fontSize:12, color:"#1d4ed8", fontWeight:500 }}>Ouvrir →</span>
                    <span onClick={e=>del(id,e)} style={{ fontSize:12, color:"#dc2626", cursor:"pointer", padding:"2px 6px", borderRadius:4 }}>✕</span>
                  </div>
                </div>
              ))}
            </Card>
          )}

          {entries.length === 0 && (
            <p style={{ textAlign:"center", color:"#9ca3af", fontSize:13, marginTop:"2rem" }}>Aucun devoir sauvegardé — créez-en un ci-dessus.</p>
          )}
        </div>
      );
    }

    /* ════ App (devoir unique) ════ */
    function App() {
      const [sessionId,   setSessionId]   = useState(null);
      const [sessionName, setSessionName] = useState("");

      const openSession = (id, name) => {
        setActiveId(id); setSessionId(id); setSessionName(name);
      };

      if (!sessionId) {
        return <SessionManager onSelect={openSession}/>;
      }

      return <Devoir sessionId={sessionId} sessionName={sessionName} onBack={()=>{ setSessionId(null); setSessionName(""); }}/>;
    }

    /* ════ Devoir (logique principale) ════ */
    function Devoir({ sessionId, sessionName, onBack }) {
      const load = (key, fallback) => { const s=getSession(sessionId); return s[key]!==undefined?s[key]:fallback; };
      const persist = (key, val) => {
        const s=getSession(sessionId); s[key]=val; saveSession(sessionId, {...getAllSessions()[sessionId],...s,[key]:val});
      };

      const [apiKey,  setApiKey]  = useState(() => { try{return localStorage.getItem("prof_maths_apikey")||"";}catch{return "";} });
      const [step,    setStepRaw] = useState(() => load("step", 0));
      const setStep = v => { setStepRaw(v); persist("step",v); };
      const [busy,    setBusy]    = useState(false);
      const [status,  setStatus]  = useState("");
      const [libsOk,  setLibsOk]  = useState({ h2c: !!window.html2canvas, jspdf: !!window.jspdf });
      const previewRef = useRef(null);

      useEffect(()=>{ try{localStorage.setItem("prof_maths_apikey",apiKey);}catch{} },[apiKey]);

      /* Étape 0 */
      const [subjectMode,  setSubjectModeRaw]  = useState(() => load("subjectMode", "generate"));
      const setSubjectMode = v => { setSubjectModeRaw(v); persist("subjectMode",v); };
      const [consignes,    setConsignesRaw]    = useState(() => load("consignes", ""));
      const setConsignes = v => { setConsignesRaw(v); persist("consignes",v); };
      const [latexSrc,     setLatexSrcRaw]     = useState(() => load("latexSrc", ""));
      const setLatexSrc = v => { setLatexSrcRaw(v); persist("latexSrc",v); };
      const [corrRef,      setCorrRefRaw]      = useState(() => load("corrRef", ""));
      const setCorrRef = v => { setCorrRefRaw(v); persist("corrRef",v); };
      const [upSubPdf,     setUpSubPdf]        = useState(null);
      const [upSubPdfName, setUpSubPdfNameRaw] = useState(() => load("upSubPdfName", ""));
      const setUpSubPdfName = v => { setUpSubPdfNameRaw(v); persist("upSubPdfName",v); };

      /* Étape 1 */
      const [studentsRaw,   setStudentsRawRaw]   = useState(() => load("studentsRaw", ""));
      const setStudentsRaw = v => { setStudentsRawRaw(v); persist("studentsRaw",v); };
      const [extracting,    setExtracting]        = useState(false);
      // Liste de PDFs : [{name, b64}]
      const [copiesPdfs,    setCopiesPdfsRaw]     = useState([]);
      const setCopiesPdfs = v => setCopiesPdfsRaw(v);
      // Alias pratique : PDF fusionné (calculé à la volée)
      const copiesPdf     = copiesPdfs.length > 0 ? copiesPdfs[0].b64 : null; // utilisé pour compat
      const copiesPdfName = copiesPdfs.map(p=>p.name).join(", ");

      /* Étape 2 */
      const [answers,     setAnswersRaw]     = useState(() => load("answers", {}));
      const setAnswers = v => { setAnswersRaw(v); persist("answers",v); };
      const [corrections, setCorrectionsRaw] = useState(() => load("corrections", []));
      const setCorrections = v => { setCorrectionsRaw(v); persist("corrections",v); };

      /* Étape 3 */
      const [mailsDone,   setMailsDoneRaw]   = useState(() => load("mailsDone", false));
      const setMailsDone = v => { setMailsDoneRaw(v); persist("mailsDone",v); };
      const [withPdfCopy, setWithPdfCopy]    = useState(true);

      useEffect(()=>{
        const check = () => setLibsOk({ h2c:!!window.html2canvas, jspdf:!!window.jspdf });
        const t = setInterval(check, 500); return () => clearInterval(t);
      },[]);

      const students    = parseStudents(studentsRaw);
      const validCorrs  = corrections.filter(c=>!c.skipped);
      const avg         = validCorrs.filter(c=>!isNaN(+c.note)).reduce((a,c,_,arr)=>a+ +c.note/arr.length,0);
      const hasPdfPages = corrections.some(c=>c.pageStart);
      const hasAnswers  = Object.values(answers).some(v=>v?.trim());
      const canNext     = [(subjectMode==="generate"?!!latexSrc:!!upSubPdf), true, corrections.length>0, true][step];

      const readPdf = (file, cb) => {
        const r = new FileReader(); r.onload = e => cb(e.target.result.split(",")[1]); r.readAsDataURL(file);
      };
      const addCopiesPdf = (files) => {
        const arr = Array.from(files).filter(f=>f.type==="application/pdf");
        if (!arr.length) return;
        let loaded = 0;
        arr.forEach(file => {
          readPdf(file, b64 => {
            setCopiesPdfs(prev => {
              const next = [...prev, {name: file.name, b64}];
              loaded++;
              // Extraire les noms depuis le premier PDF ajouté si liste vide
              if (prev.length === 0 && loaded === 1) extractNames(b64);
              return next;
            });
          });
        });
      };
      // Compat alias
      const handleCopiesPdf = (file) => addCopiesPdf([file]);
      const handleSubjectPdf = (file) => {
        if (!file||file.type!=="application/pdf") return;
        setUpSubPdfName(file.name);
        readPdf(file, b64 => setUpSubPdf(b64));
      };

      const extractNames = async (b64) => {
        if (!b64||!apiKey) return;
        setExtracting(true);
        try {
          const raw = await callClaude(apiKey, [{ role:"user", content:[
            { type:"document", source:{ type:"base64", media_type:"application/pdf", data:b64 } },
            { type:"text", text:"Extrais le nom complet et l'email de chaque élève depuis ces copies.\nJSON uniquement sans backticks :\n[{\"name\":\"Prénom Nom\",\"email\":\"...\"}]\nSi pas d'email visible, mets \"\"." }
          ]}], "Tu extrais des noms d'élèves. JSON uniquement.");
          const arr = JSON.parse(raw.replace(/```json|```/g,"").trim());
          setStudentsRaw(arr.map(s=>s.email?`${s.name}, ${s.email}`:s.name).join("\n"));
        } catch(e) { console.error(e); }
        setExtracting(false);
      };

      const generateSubject = async () => {
        if (!consignes.trim()||!apiKey) return;
        setBusy(true); setStatus("Génération du sujet en LaTeX…");
        try {
          const res = await callClaude(apiKey, [{ role:"user", content:
            `Génère un sujet de mathématiques en LaTeX selon ces consignes :\n${consignes}\n\nRetourne UNIQUEMENT le contenu LaTeX (sans \\documentclass ni \\begin{document}), puis la correction séparée par ---CORRECTION--- :\n\n\\begin{center}\n{\\Large\\textbf{Devoir de mathématiques}}\\\\[4pt]\n{\\normalsize [Niveau] \\hfill Durée : 1h}\n\\end{center}\n\\vspace{8pt}\n\\section*{Exercice 1 --- [titre] \\hfill (X points)}\n\\begin{enumerate}\n  \\item Énoncé avec $f(x) = ...$\n\\end{enumerate}\n\n---CORRECTION---\n\\section*{Corrigé exercice 1}\n...` }],
            "Tu es professeur de mathématiques au lycée français. LaTeX rigoureux pour toutes les formules."
          );
          const sep = res.indexOf("---CORRECTION---");
          setLatexSrc(sep>0?res.slice(0,sep).trim():res);
          setCorrRef(sep>0?res.slice(sep+16).trim():"");
        } catch(e) { setStatus("Erreur : "+e.message); }
        setBusy(false); setStatus("");
      };

      const downloadSubjectPdf = async () => {
        if (!previewRef.current||!libsOk.h2c||!libsOk.jspdf) return;
        setBusy(true); setStatus("Génération du PDF…");
        try {
          const el=previewRef.current;
          const canvas=await window.html2canvas(el,{scale:2,useCORS:true,backgroundColor:"#ffffff"});
          const {jsPDF}=window.jspdf;
          const pdf=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
          const W=pdf.internal.pageSize.getWidth(),H=pdf.internal.pageSize.getHeight(),m=15;
          const iw=W-m*2; let remaining=(canvas.height*iw)/canvas.width,srcY=0;
          while(remaining>0){
            const sliceH=Math.min(remaining,H-m*2);
            const sc=document.createElement("canvas");const ratio=canvas.width/iw;
            sc.width=canvas.width;sc.height=sliceH*ratio;
            sc.getContext("2d").drawImage(canvas,0,srcY*ratio,canvas.width,sliceH*ratio,0,0,canvas.width,sliceH*ratio);
            if(srcY>0)pdf.addPage();
            pdf.addImage(sc.toDataURL("image/png"),"PNG",m,m,iw,sliceH);
            srcY+=sliceH;remaining-=sliceH;
          }
          pdf.save("sujet_maths.pdf");
        } catch(e){setStatus("Erreur : "+e.message);}
        setBusy(false);setStatus("");
      };

      const correctFromPdf = async () => {
        if (!copiesPdfs.length||!apiKey) return;
        setBusy(true);setStatus("Fusion des PDFs…");
        let mergedB64;
        try { mergedB64 = await mergePdfs(copiesPdfs); }
        catch(e) { setStatus("Erreur fusion PDF : "+e.message); setBusy(false); return; }
        setStatus("Lecture et correction en cours…");
        const studentList=students.map(s=>`- ${s.name}`).join("\n");
        try {
          const blocks=[
            ...(subjectMode==="upload"&&upSubPdf?[{type:"document",source:{type:"base64",media_type:"application/pdf",data:upSubPdf}}]:[]),
            {type:"document",source:{type:"base64",media_type:"application/pdf",data:mergedB64}},
            {type:"text",text:`Copies des élèves :\n${studentList}\n\nSUJET${subjectMode==="upload"?" (voir PDF joint)":":\n"+latexSrc}\n\nCORRIGÉ :\n${corrRef||"[utilise tes connaissances]"}\n\nIdentifie chaque copie, ses pages, corrige-la.\nIMPORTANT : dans l'appréciation et le conseil, tutoie l'élève (tu, ton, ta) et utilise son prénom seul.\nJSON uniquement sans backticks :\n[{"name":"Nom Prénom","pageStart":1,"pageEnd":2,"note":14,"appreciation":"Lucas, tu maîtrises...","details":[{"exercice":"Ex 1","obtenu":"7","sur":"10","remarque":"..."}],"conseil":"Tu devrais..."}]`}
          ];
          const raw=await callClaude(apiKey,[{role:"user",content:blocks}],"Tu es correcteur de mathématiques bienveillant. Dans tes appréciations et conseils, tutoie toujours l'élève (tu maîtrises, tu dois, tu as bien...) et utilise son prénom seul. JSON uniquement.");
          const arr=JSON.parse(raw.replace(/```json|```/g,"").trim());
          setCorrections(students.map(s=>{
            const f=arr.find(r=>r.name?.toLowerCase().includes(s.name.split(" ")[0].toLowerCase()));
            return f?{...s,...f}:{...s,skipped:true};
          }));
        } catch(e){setStatus("Erreur : "+e.message);}
        setBusy(false);setStatus("");
      };

      const correctAll = async () => {
        if(!apiKey)return;
        setBusy(true);const results=[];
        for(const s of students){
          const ans=(answers[s.id]||"").trim();
          if(!ans){results.push({...s,skipped:true});continue;}
          setStatus(`Correction de ${s.name}…`);
          try{
            const raw=await callClaude(apiKey,[{role:"user",content:`Corrige cette copie.\nSUJET:\n${latexSrc}\nCORRIGÉ:\n${corrRef||"[utilise tes connaissances]"}\nCOPIE DE ${s.name} (prénom: ${s.name.split(" ")[0]}):\n${answers[s.id]}\nIMPORTANT : tutoie l'élève et utilise son prénom seul dans l'appréciation et le conseil.\nJSON uniquement:\n{"note":14,"appreciation":"${s.name.split(" ")[0]}, tu maîtrises...","details":[{"exercice":"Ex 1","obtenu":"7","sur":"10","remarque":"..."}],"conseil":"Tu devrais..."}`}],"Tu es correcteur de mathématiques bienveillant. Dans tes appréciations et conseils, tutoie toujours l'élève (tu maîtrises, tu dois, tu as bien...) et utilise son prénom seul. JSON uniquement.");
            results.push({...s,...JSON.parse(raw.replace(/```json|```/g,"").trim())});
          }catch{results.push({...s,note:"?",appreciation:"Erreur.",details:[],conseil:""});}
        }
        setCorrections(results);setBusy(false);setStatus("");
      };

      const exportCsv = () => {
        const header="Nom,Note /20,Appréciation,Conseil,"+(validCorrs[0]?.details?.map(d=>d.exercice).join(","))||"";
        const rows=validCorrs.map(c=>{
          const det=c.details?.map(d=>`${d.obtenu}/${d.sur}`).join(",")||"";
          return `"${c.name}","${c.note}","${(c.appreciation||"").replace(/"/g,"'")}","${(c.conseil||"").replace(/"/g,"'")}","${det}"`;
        });
        const a=document.createElement("a");
        a.href="data:text/csv;charset=utf-8,"+encodeURIComponent([header,...rows].join("\n"));
        a.download=`corrections_${sessionName.replace(/[^a-z0-9]/gi,"_")}.csv`;a.click();
      };

      const exportPdfRecap = () => {
        if(!libsOk.jspdf)return;
        const {jsPDF}=window.jspdf;
        const pdf=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
        const marg=15;let y=marg;const pw=180,lh=6;
        const addLine=(txt,opts={})=>{
          if(y>270){pdf.addPage();y=marg;}
          pdf.setFont("helvetica",opts.bold?"bold":"normal");
          pdf.setFontSize(opts.size||10);pdf.setTextColor(...(opts.color||[0,0,0]));
          const lines=pdf.splitTextToSize(txt,pw);pdf.text(lines,marg,y);
          y+=lines.length*lh+(opts.after||0);
        };
        addLine(`Récapitulatif — ${sessionName}`,{bold:true,size:14,after:4});
        addLine(`Moyenne de classe : ${avg.toFixed(1)}/20`,{size:11,color:[80,80,80],after:6});
        validCorrs.forEach(c=>{
          if(y>250){pdf.addPage();y=marg;}
          pdf.setDrawColor(200,200,200);pdf.line(marg,y,marg+pw,y);y+=4;
          const col=!isNaN(+c.note)?(+c.note>=10?[22,163,74]:[220,38,38]):[0,0,0];
          addLine(`${c.name}  —  ${c.note}/20`,{bold:true,size:12,color:col,after:2});
          addLine(c.appreciation||"",{size:9,color:[80,80,80],after:2});
          c.details?.forEach(d=>addLine(`• ${d.exercice} : ${d.obtenu}/${d.sur} — ${d.remarque}`,{size:8.5,color:[60,60,60]}));
          if(c.conseil){y+=2;addLine(`Conseil : ${c.conseil}`,{size:8.5,color:[80,80,180],after:4});}else y+=4;
        });
        pdf.save(`corrections_${sessionName.replace(/[^a-z0-9]/gi,"_")}.pdf`);
      };

      const sendResults = async () => {
        setBusy(true);
        // Obtenir le token Gmail une seule fois avant la boucle
        try {
          setStatus("Connexion Gmail — choisissez maths.perriand@gmail.com…");
          await getGmailToken();
        } catch(e) {
          setStatus("❌ " + (e.message || e) + " — Réessayez.");
          setBusy(false); return;
        }
        let errors = [];
        for(const c of corrections){
          if(c.skipped||!c.email)continue;
          setStatus(`Envoi à ${c.name}…`);
          const details=c.details?.map(d=>`• ${d.exercice} : ${d.obtenu}/${d.sur} — ${d.remarque}`).join("\n")||"";
          const prenom = c.name.split(" ")[0];
          const appreciation = (c.appreciation||"").replace(/il\/elle/gi,"tu").replace(/l'élève/gi,"tu").replace(new RegExp(c.name,"gi"), prenom);
          const conseil = (c.conseil||"").replace(/il\/elle/gi,"tu").replace(/l'élève/gi,"tu").replace(new RegExp(c.name,"gi"), prenom);
          const body=`Bonjour ${prenom},\n\nVoici ton résultat pour ce devoir de mathématiques.\n\nNOTE : ${c.note}/20\n\nAppréciation :\n${appreciation}\n\nDétail :\n${details}\n\nConseil :\n${conseil}\n\nCordialement,\nF. Nocca`;
          const subject=`Résultats – ${sessionName}`;
          let pdfB64=null, pdfFilename=null;
          const mergedForSend = copiesPdfs.length>1 ? await mergePdfs(copiesPdfs).catch(()=>copiesPdfs[0]?.b64) : copiesPdfs[0]?.b64;
          if(withPdfCopy&&mergedForSend&&window.PDFLib&&c.pageStart&&c.pageEnd){
            try{
              setStatus(`Découpage et assemblage de la copie de ${prenom}…`);
              const copiePdf = await extractPdfPages(mergedForSend,c.pageStart,c.pageEnd);

              // ── Générer le corrigé LaTeX → HTML/KaTeX → canvas → PDF ──
              setStatus(`Génération du corrigé LaTeX pour ${prenom}…`);

              // Demander à l'IA un corrigé LaTeX structuré exercice par exercice
              const corrLatex = await callClaude(apiKey, [{role:"user", content:
                "Génère le corrigé détaillé en LaTeX pour " + prenom + " (note : " + c.note + "/20).\n" +
                "SUJET :\n" + (latexSrc||"[sujet fourni en PDF]") + "\n\n" +
                "DÉTAIL DE LA CORRECTION :\n" + (c.details||[]).map(d=>d.exercice+" : "+d.remarque).join("\n") + "\n\n" +
                "Retourne UNIQUEMENT le contenu LaTeX du corrigé (sans \\documentclass), exercice par exercice avec toutes les formules en LaTeX.\n" +
                "Format :\n\\section*{Corrigé Exercice 1}\n\\begin{enumerate}\n  \\item solution détaillée avec $formules$\n\\end{enumerate}\n..."
              }], "Tu es professeur de maths. LaTeX rigoureux pour toutes les formules. Pas de \\documentclass.");

              // Construire le HTML du corrigé complet
              const noteColor = !isNaN(+c.note) ? (+c.note>=10?"#16a34a":"#dc2626") : "#111";
              const corrHtml = `
                <div style="font-family:Georgia,serif;max-width:700px;margin:0 auto;padding:32px;background:#fff;color:#111;line-height:1.7;font-size:13pt">
                  <h1 style="font-size:16pt;border-bottom:1px solid #333;padding-bottom:8px;margin-bottom:16px">Corrigé — ${prenom}</h1>
                  <p style="font-size:13pt;font-weight:bold;color:${noteColor};margin-bottom:4px">Note : ${c.note}/20</p>
                  <p style="font-size:11pt;color:#555;margin-bottom:16px;font-style:italic">${appreciation}</p>
                  ${latexToHtml(corrLatex)}
                  <div style="margin-top:24px;padding:12px 16px;background:#eff6ff;border-left:3px solid #3b82f6;border-radius:4px;font-size:11pt;color:#1e40af">
                    <strong>Conseil :</strong> ${conseil}
                  </div>
                  <p style="margin-top:24px;font-size:11pt;color:#555">Cordialement, F. Nocca</p>
                </div>`;

              // Rendre dans un div caché, capturer en canvas, convertir en PDF
              const corrDiv = document.createElement("div");
              corrDiv.style.cssText = "position:fixed;left:-9999px;top:0;width:794px;background:#fff";
              corrDiv.innerHTML = corrHtml;
              // Injecter la feuille KaTeX
              const katexLink = document.createElement("link");
              katexLink.rel="stylesheet"; katexLink.href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css";
              corrDiv.prepend(katexLink);
              document.body.appendChild(corrDiv);
              await new Promise(r=>setTimeout(r,300)); // laisser KaTeX rendre

              setStatus(`Mise en page PDF de la copie de ${prenom}…`);
              const canvas = await window.html2canvas(corrDiv, {scale:2, useCORS:true, backgroundColor:"#fff"});
              document.body.removeChild(corrDiv);

              const {jsPDF} = window.jspdf;
              const corrPdfDoc = new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
              const W=corrPdfDoc.internal.pageSize.getWidth(), H=corrPdfDoc.internal.pageSize.getHeight(), m=10;
              const iw=W-m*2; let remaining=(canvas.height*iw)/canvas.width, srcY=0;
              while(remaining>0){
                const sliceH=Math.min(remaining,H-m*2);
                const sc=document.createElement("canvas"); const ratio=canvas.width/iw;
                sc.width=canvas.width; sc.height=sliceH*ratio;
                sc.getContext("2d").drawImage(canvas,0,srcY*ratio,canvas.width,sliceH*ratio,0,0,canvas.width,sliceH*ratio);
                if(srcY>0) corrPdfDoc.addPage();
                corrPdfDoc.addImage(sc.toDataURL("image/png"),"PNG",m,m,iw,sliceH);
                srcY+=sliceH; remaining-=sliceH;
              }
              const corrB64 = corrPdfDoc.output("datauristring").split(",")[1];

              // Fusionner copie + corrigé
              pdfB64 = await mergePdfs([{name:"copie",b64:copiePdf},{name:"corrige",b64:corrB64}]);
              pdfFilename=`copie_corrigee_${prenom}.pdf`;
            }catch(e){ console.error(e); }
          }
          try {
            await sendGmail(c.email, subject, body, pdfB64, pdfFilename);
          } catch(e) {
            errors.push(c.name);
            console.error("Erreur envoi " + c.name, e);
          }
        }
        setMailsDone(true); setBusy(false);
        setStatus(errors.length ? `⚠️ Échec pour : ${errors.join(", ")}` : "");
      };

      return (
        <div style={{ maxWidth:700, margin:"0 auto", padding:"1.5rem 1rem" }}>
          {/* Header */}
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"1.5rem" }}>
            <div>
              <h1 style={{ fontSize:16, marginBottom:2 }}>📐 {sessionName}</h1>
              <span style={{ fontSize:12, color:"#9ca3af", cursor:"pointer" }} onClick={onBack}>← Tous les devoirs</span>
            </div>
            <div style={{ fontSize:11, color:"#9ca3af" }}>💾 Sauvegarde automatique</div>
          </div>

          {/* Clé API */}
          <Card>
            <Field label="🔑 Clé API Anthropic">
              <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-api03-..." style={{ fontFamily:"monospace" }}/>
            </Field>
            {!apiKey&&<p style={{ fontSize:12,color:"#dc2626",marginTop:6 }}>⚠️ Saisissez votre clé API pour activer l'outil.</p>}
            {apiKey&&<p style={{ fontSize:12,color:"#16a34a",marginTop:6 }}>✓ Clé partagée entre tous les devoirs.</p>}
          </Card>

          {/* Stepper */}
          <div style={{ display:"flex", alignItems:"flex-start", marginBottom:"2rem" }}>
            {STEPS.map((label,i)=>{
              const done=i<step,active=i===step;
              return (
                <div key={i} style={{ flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:6 }}>
                  <div style={{ display:"flex",alignItems:"center",width:"100%" }}>
                    {i>0&&<div style={{ flex:1,height:"0.5px",marginTop:16,background:i<=step?"#16a34a":"#e5e7eb" }}/>}
                    <div onClick={()=>done&&setStep(i)} style={{
                      width:32,height:32,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:13,fontWeight:500,flexShrink:0,cursor:done?"pointer":"default",
                      background:done?"#dcfce7":active?"#fff":"#f3f4f6",
                      color:done?"#16a34a":active?"#1d4ed8":"#9ca3af",
                      border:done?"none":active?"2px solid #1d4ed8":"0.5px solid #e5e7eb",
                    }}>{done?"✓":i+1}</div>
                    {i<3&&<div style={{ flex:1,height:"0.5px",marginTop:16,background:i<step?"#16a34a":"#e5e7eb" }}/>}
                  </div>
                  <span style={{ fontSize:11,textAlign:"center",color:active?"#1d4ed8":"#9ca3af",fontWeight:active?500:400 }}>{label}</span>
                </div>
              );
            })}
          </div>

          {/* ═══ STEP 0 ═══ */}
          {step===0&&(<>
            <div style={{ display:"flex",gap:8,marginBottom:16 }}>
              {[["generate","✨ Générer avec l'IA"],["upload","📂 J'ai déjà un sujet (PDF)"]].map(([mode,lbl])=>(
                <button key={mode} onClick={()=>setSubjectMode(mode)} style={{
                  flex:1,padding:"10px 0",fontSize:13,fontWeight:500,
                  background:subjectMode===mode?"#1d4ed8":"#f3f4f6",
                  color:subjectMode===mode?"#fff":"#6b7280",
                  border:subjectMode===mode?"none":"0.5px solid #e5e7eb",borderRadius:8,
                }}>{lbl}</button>
              ))}
            </div>
            {subjectMode==="generate"&&(<>
              <Card>
                <Field label="Vos consignes pour le sujet">
                  <textarea value={consignes} onChange={e=>setConsignes(e.target.value)}
                    placeholder="Ex : Devoir de Terminale sur les suites, 3 exercices progressifs…"
                    style={{ minHeight:130,lineHeight:1.6 }}/>
                </Field>
                <button disabled={busy||!consignes.trim()||!apiKey} onClick={generateSubject} style={{ width:"100%",marginTop:8 }}>
                  {busy?status:"✨ Générer le sujet"}
                </button>
              </Card>
              {latexSrc&&(<>
                <Card>
                  <SectionHead title="Aperçu du sujet"/>
                  <div ref={previewRef} style={{ background:"#fff",color:"#111",padding:"28px 32px",border:"0.5px solid #e5e7eb",borderRadius:6,lineHeight:1.8,fontSize:13 }}
                    dangerouslySetInnerHTML={{ __html:latexToHtml(latexSrc) }}/>
                </Card>
                <Card>
                  <SectionHead title="Source LaTeX — modifiable"/>
                  <textarea value={latexSrc} onChange={e=>setLatexSrc(e.target.value)} style={{ minHeight:180,fontFamily:"monospace",fontSize:11.5 }}/>
                </Card>
              </>)}
            </>)}
            {subjectMode==="upload"&&(
              <Card>
                <div style={{ fontSize:14,fontWeight:500,marginBottom:10 }}>Votre sujet en PDF</div>
                <div onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();handleSubjectPdf(e.dataTransfer.files[0]);}}
                  onClick={()=>document.getElementById("subj-pdf").click()}
                  style={{ border:"1.5px dashed #d1d5db",borderRadius:8,padding:"2rem",textAlign:"center",cursor:"pointer",background:upSubPdf?"#f0fdf4":"#f9fafb" }}>
                  <input id="subj-pdf" type="file" accept="application/pdf" style={{ display:"none" }} onChange={e=>handleSubjectPdf(e.target.files[0])}/>
                  {upSubPdf?<span style={{ color:"#16a34a",fontWeight:500 }}>✓ {upSubPdfName}</span>:<span style={{ color:"#6b7280",fontSize:13 }}>Glissez le PDF ici ou cliquez</span>}
                </div>
              </Card>
            )}
          </>)}

          {/* ═══ STEP 1 ═══ */}
          {step===1&&(<>
            {subjectMode==="generate"&&(
              <Card>
                <p style={{ fontSize:13,color:"#6b7280",marginBottom:12 }}>Téléchargez le PDF du sujet pour le déposer dans Pronote.</p>
                <button disabled={busy||!libsOk.h2c||!libsOk.jspdf} onClick={downloadSubjectPdf} style={{ width:"100%" }}>
                  {busy?status:"📥 Télécharger le sujet en PDF"}
                </button>
                {(!libsOk.h2c||!libsOk.jspdf)&&<p style={{ fontSize:11,color:"#9ca3af",marginTop:6,textAlign:"center" }}>Chargement des librairies…</p>}
              </Card>
            )}
            {subjectMode==="upload"&&(
              <Card>
                <div style={{ display:"flex",alignItems:"center",gap:10 }}>
                  <span style={{ fontSize:20 }}>✓</span>
                  <div>
                    <div style={{ fontSize:14,fontWeight:500 }}>Sujet chargé : {upSubPdfName}</div>
                    <div style={{ fontSize:12,color:"#6b7280" }}>Utilisé par l'IA à l'étape Correction.</div>
                  </div>
                </div>
              </Card>
            )}
            {subjectMode==="generate"&&latexSrc&&(
              <Card>
                <SectionHead title="Aperçu"/>
                <div style={{ background:"#fff",color:"#111",padding:"24px 28px",border:"0.5px solid #e5e7eb",borderRadius:6,lineHeight:1.8,fontSize:13 }}
                  dangerouslySetInnerHTML={{ __html:latexToHtml(latexSrc) }}/>
              </Card>
            )}
            <Card>
              <div style={{ fontSize:14,fontWeight:500,marginBottom:10 }}>👥 Liste des élèves</div>
              <div onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();addCopiesPdf(e.dataTransfer.files);}}
                onClick={()=>document.getElementById("copies-pdf").click()}
                style={{ border:"1.5px dashed #d1d5db",borderRadius:8,padding:"1rem",textAlign:"center",cursor:"pointer",marginBottom:10,background:copiesPdfs.length?"#f0fdf4":"#f9fafb" }}>
                <input id="copies-pdf" type="file" accept="application/pdf" multiple style={{ display:"none" }} onChange={e=>{if(e.target.files.length)addCopiesPdf(e.target.files);}}/>
                {copiesPdfs.length>0
                  ?<span style={{ color:"#16a34a",fontWeight:500 }}>✓ {copiesPdfs.length} fichier{copiesPdfs.length>1?"s":""} — {copiesPdfName}</span>
                  :<span style={{ color:"#6b7280",fontSize:13 }}>📄 Déposez le(s) PDF des copies pour extraire les noms<br/><span style={{ fontSize:11 }}>(réutilisé à l'étape Correction)</span></span>}
              </div>
              {extracting&&<p style={{ fontSize:12,color:"#1d4ed8",marginBottom:8,textAlign:"center" }}>🔍 Extraction des noms en cours…</p>}
              <Field label={copiesPdf?"Noms extraits — vérifiez et complétez les emails":"Ou saisissez manuellement — Nom Prénom, email"}>
                <textarea value={studentsRaw} onChange={e=>setStudentsRaw(e.target.value)}
                  placeholder={"Marie Dupont, marie.dupont@lycee.fr\nPaul Martin, paul.martin@lycee.fr"}
                  style={{ minHeight:100,fontFamily:"monospace",fontSize:12 }}/>
              </Field>
            </Card>
          </>)}

          {/* ═══ STEP 2 ═══ */}
          {step===2&&(<>
            {corrections.length===0&&(
              <Card>
                <div style={{ fontSize:14,fontWeight:500,marginBottom:10 }}>📄 Copies à corriger</div>

                {/* Zone dépôt multi-PDF */}
                <div onDragOver={e=>e.preventDefault()}
                  onDrop={e=>{e.preventDefault();addCopiesPdf(e.dataTransfer.files);}}
                  onClick={()=>document.getElementById("copies-pdf2").click()}
                  style={{ border:"1.5px dashed #d1d5db",borderRadius:8,padding:"1.5rem",textAlign:"center",cursor:"pointer",marginBottom:10,background:copiesPdfs.length?"#f0fdf4":"#f9fafb" }}>
                  <input id="copies-pdf2" type="file" accept="application/pdf" multiple style={{ display:"none" }}
                    onChange={e=>addCopiesPdf(e.target.files)}/>
                  {copiesPdfs.length===0
                    ? <span style={{ color:"#6b7280",fontSize:13 }}>Glissez un ou plusieurs PDFs ici ou cliquez<br/><span style={{ fontSize:11 }}>Vous pouvez déposer les copies en plusieurs fichiers séparés</span></span>
                    : <span style={{ color:"#16a34a",fontSize:13 }}>✓ {copiesPdfs.length} fichier{copiesPdfs.length>1?"s":""} chargé{copiesPdfs.length>1?"s":""}</span>
                  }
                </div>

                {/* Liste des PDFs chargés */}
                {copiesPdfs.length>0&&(
                  <div style={{ marginBottom:10 }}>
                    {copiesPdfs.map((p,i)=>(
                      <div key={i} style={{ display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12,padding:"4px 8px",background:"#f3f4f6",borderRadius:6,marginBottom:4 }}>
                        <span>📄 {p.name}</span>
                        <span style={{ color:"#dc2626",cursor:"pointer",padding:"0 4px" }}
                          onClick={()=>setCopiesPdfs(prev=>prev.filter((_,j)=>j!==i))}>✕</span>
                      </div>
                    ))}
                    <button onClick={()=>document.getElementById("copies-pdf-add").click()}
                      style={{ width:"100%",background:"#f3f4f6",color:"#374151",border:"0.5px solid #d1d5db",fontSize:12,marginTop:4 }}>
                      ➕ Ajouter un PDF (copie en retard…)
                    </button>
                    <input id="copies-pdf-add" type="file" accept="application/pdf" multiple style={{ display:"none" }}
                      onChange={e=>addCopiesPdf(e.target.files)}/>
                  </div>
                )}

                {copiesPdfs.length>0&&<button disabled={busy||!apiKey} onClick={correctFromPdf} style={{ width:"100%",marginBottom:8 }}>{busy?status:"🤖 Corriger depuis les PDFs ↗"}</button>}
                <div style={{ textAlign:"center",fontSize:12,color:"#9ca3af",margin:"10px 0 6px" }}>— ou saisir manuellement —</div>
                {students.map(s=>(
                  <Card key={s.id}>
                    <SectionHead title={s.name}/>
                    <Field label="Réponses de l'élève">
                      <textarea value={answers[s.id]||""} onChange={e=>setAnswers({...answers,[s.id]:e.target.value})}
                        placeholder="Saisissez ou résumez les réponses…" style={{ minHeight:80,fontFamily:"monospace",fontSize:12 }}/>
                    </Field>
                  </Card>
                ))}
                {hasAnswers&&<button disabled={busy||!apiKey} onClick={correctAll} style={{ width:"100%" }}>{busy?status:"🤖 Corriger toutes les copies ↗"}</button>}
              </Card>
            )}
            {corrections.length>0&&(<>
              {students.map(s=>{
                const c=corrections.find(x=>x.id===s.id);
                const nc=c&&!isNaN(+c.note)?(+c.note>=10?"#16a34a":"#dc2626"):"#111";
                return (
                  <Card key={s.id}>
                    <SectionHead title={s.name} right={c&&!c.skipped
                      ?<div style={{ display:"flex",alignItems:"center",gap:8 }}>
                          {c.pageStart&&<Bdg color="info">p.{c.pageStart}–{c.pageEnd}</Bdg>}
                          <span style={{ fontSize:22,fontWeight:500,color:nc }}>{c.note}<span style={{ fontSize:14,color:"#6b7280" }}>/20</span></span>
                        </div>:null}/>
                    {c&&!c.skipped?(<>
                      <p style={{ fontSize:13,color:"#6b7280",margin:"0 0 8px" }}>{c.appreciation}</p>
                      {c.details?.map((d,i)=>(
                        <div key={i} style={{ display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",borderTop:"0.5px solid #e5e7eb" }}>
                          <span style={{ color:"#6b7280" }}>{d.exercice}</span>
                          <span style={{ fontWeight:500 }}>{d.obtenu}/{d.sur} — {d.remarque}</span>
                        </div>
                      ))}
                      <p style={{ fontSize:12,color:"#6b7280",fontStyle:"italic",margin:"8px 0 0" }}>💡 {c.conseil}</p>
                    </>):<p style={{ fontSize:13,color:"#9ca3af",fontStyle:"italic" }}>Copie non trouvée dans le PDF</p>}
                  </Card>
                );
              })}
              <div style={{ display:"flex",gap:8,marginTop:4 }}>
                <button onClick={()=>setCorrections([])} style={{ flex:1,background:"#f3f4f6",color:"#374151",border:"0.5px solid #d1d5db" }}>↩ Recommencer</button>
                <button disabled={busy||!apiKey} onClick={()=>document.getElementById("late-pdf").click()}
                  style={{ flex:1,background:"#f3f4f6",color:"#1d4ed8",border:"0.5px solid #bfdbfe",fontSize:12 }}>
                  ➕ Copie en retard
                </button>
                <input id="late-pdf" type="file" accept="application/pdf" style={{ display:"none" }} onChange={async e=>{
                  const f=e.target.files[0]; if(!f)return;
                  setBusy(true); setStatus(`Correction de ${f.name}…`);
                  readPdf(f, async b64 => {
                    setCopiesPdfs(prev=>[...prev,{name:f.name,b64}]);
                    try {
                      const blocks=[
                        ...(subjectMode==="upload"&&upSubPdf?[{type:"document",source:{type:"base64",media_type:"application/pdf",data:upSubPdf}}]:[]),
                        {type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},
                        {type:"text",text:"Corrige cette copie en retard (PDF joint).\nSUJET"+(subjectMode==="upload"?" (voir PDF joint)":":\n"+latexSrc)+"\nCORRIGÉ :\n"+(corrRef||"[utilise tes connaissances]")+"\nJSON uniquement sans backticks :\n[{\"name\":\"Nom Prénom\",\"pageStart\":1,\"pageEnd\":1,\"note\":14,\"appreciation\":\"...\",\"details\":[{\"exercice\":\"Ex 1\",\"obtenu\":\"7\",\"sur\":\"10\",\"remarque\":\"...\"}],\"conseil\":\"...\"}]"}
                      ];
                      const raw=await callClaude(apiKey,[{role:"user",content:blocks}],"Tu es correcteur de mathématiques bienveillant. Dans tes appréciations et conseils, tutoie toujours l'élève (tu maîtrises, tu dois, tu as bien...) et utilise son prénom seul. JSON uniquement.");
                      const arr=JSON.parse(raw.replace(/\`\`\`json|\`\`\`/g,"").trim());
                      if(arr.length>0){
                        const newC=arr[0];
                        const existingStudent=students.find(s=>s.name.toLowerCase().includes(newC.name?.split(" ")[0]?.toLowerCase()));
                        setCorrections(prev=>[...prev,{...(existingStudent||{id:Date.now(),name:newC.name,email:""}),...newC}]);
                      }
                    } catch(err){console.error(err);}
                    setBusy(false);setStatus("");
                  });
                }}/>
              </div>
            </>)}
          </>)}

          {/* ═══ STEP 3 ═══ */}
          {step===3&&(
            <Card>
              <div style={{ display:"flex",gap:8,marginBottom:16 }}>
                <button onClick={exportCsv} style={{ flex:1,fontSize:12,background:"#f3f4f6",color:"#374151",border:"0.5px solid #d1d5db" }}>📊 CSV</button>
                <button onClick={exportPdfRecap} disabled={!libsOk.jspdf} style={{ flex:1,fontSize:12,background:"#f3f4f6",color:"#374151",border:"0.5px solid #d1d5db" }}>📄 PDF récap</button>
              </div>
              <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:12,marginBottom:16 }}>
                {validCorrs.map(c=>{
                  const nc=!isNaN(+c.note)?(+c.note>=10?"#16a34a":"#dc2626"):"#6b7280";
                  return (
                    <div key={c.id} style={{ background:"#f3f4f6",borderRadius:8,padding:14,textAlign:"center" }}>
                      <div style={{ fontSize:11,color:"#6b7280",marginBottom:4 }}>{c.name}</div>
                      <div style={{ fontSize:26,fontWeight:500,color:nc }}>{c.note}<span style={{ fontSize:14,color:"#6b7280" }}>/20</span></div>
                    </div>
                  );
                })}
              </div>
              <div style={{ display:"flex",justifyContent:"space-between",padding:"10px 0",borderTop:"0.5px solid #e5e7eb" }}>
                <span style={{ fontSize:13,color:"#6b7280" }}>Moyenne de classe</span>
                <span style={{ fontSize:18,fontWeight:500 }}>{validCorrs.length>0?avg.toFixed(1):"—"}/20</span>
              </div>
              {hasPdfPages&&window.PDFLib&&(
                <div style={{ display:"flex",alignItems:"center",gap:10,padding:"12px 0",borderTop:"0.5px solid #e5e7eb" }}>
                  <input type="checkbox" id="chk-pdf" checked={withPdfCopy} onChange={e=>setWithPdfCopy(e.target.checked)} style={{ width:16,height:16 }}/>
                  <label htmlFor="chk-pdf" style={{ fontSize:13,cursor:"pointer" }}>
                    📎 Télécharger la copie découpée avant chaque mail
                    <span style={{ display:"block",fontSize:11,color:"#6b7280" }}>Chaque PDF sera téléchargé puis votre client mail s'ouvrira</span>
                  </label>
                </div>
              )}
              <div style={{ background:"#f0fdf4",border:"0.5px solid #86efac",borderRadius:8,padding:"10px 12px",margin:"12px 0",fontSize:12,color:"#166534" }}>
                ✉️ Les mails seront envoyés automatiquement depuis <strong>maths.perriand@gmail.com</strong>.<br/>
                Un écran Google s'ouvrira la première fois pour confirmer l'autorisation.
              </div>
              {mailsDone
                ?<div style={{ textAlign:"center",padding:"1.5rem" }}>
                    <div style={{ fontSize:28,marginBottom:8 }}>✅</div>
                    <span style={{ fontWeight:500,color:"#16a34a" }}>Mails préparés pour tous les élèves !</span>
                  </div>
                :<button disabled={busy} onClick={sendResults} style={{ width:"100%",marginTop:8 }}>
                    {busy?status:"📬 Préparer et envoyer les résultats"}
                  </button>
              }
            </Card>
          )}

          {/* Nav */}
          <div style={{ display:"flex",justifyContent:"space-between",marginTop:"1.5rem" }}>
            {step>0?<button style={{ background:"#f3f4f6",color:"#374151",border:"0.5px solid #d1d5db" }} disabled={busy} onClick={()=>setStep(step-1)}>← Retour</button>:<div/>}
            {step<3&&<button disabled={!canNext||busy||!apiKey} onClick={()=>setStep(step+1)}>
              {["Diffuser →","Corriger les copies →","Voir les résultats →"][step]}
            </button>}
          </div>
          <p style={{ textAlign:"center",fontSize:11,color:"#9ca3af",marginTop:"2rem" }}>Powered by Claude (Anthropic)</p>
        </div>
      );
    }

        ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
