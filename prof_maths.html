function getGmailToken() {
  return new Promise((resolve, reject) => {
    if (gmailToken) { resolve(gmailToken); return; }
    if (!window.google?.accounts?.oauth2) { reject(new Error("Google non chargé")); return; }
    let done = false;
    const timeout = setTimeout(() => { if (!done) { done = true; reject(new Error("Délai dépassé")); } }, 120000);
    window.google.accounts.oauth2.initTokenClient({
      client_id: GMAIL_CLIENT_ID,
      scope: GMAIL_SCOPE,
      login_hint: GMAIL_SENDER,
      callback: (r) => {
        clearTimeout(timeout);
        if (done) return; done = true;
        if (r.error) { reject(new Error(r.error)); return; }
        gmailToken = r.access_token;
        setTimeout(() => { gmailToken = null; }, (r.expires_in - 60) * 1000);
        resolve(gmailToken);
      },
      error_callback: (e) => { clearTimeout(timeout); if (!done) { done = true; reject(new Error(e.type || "Refus")); } }
    }).requestAccessToken({ prompt: "select_account" });
  });
}

function b64url(s) { return btoa(unescape(encodeURIComponent(s))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,""); }

function buildMime(to, subj, body) {
  return b64url([
    `From: ${GMAIL_SENDER}`, `To: ${to}`,
    `Subject: =?UTF-8?B?${btoa(unescape(encodeURIComponent(subj)))}?=`,
    "MIME-Version: 1.0", "Content-Type: text/plain; charset=utf-8",
    "Content-Transfer-Encoding: base64", "",
    btoa(unescape(encodeURIComponent(body)))
  ].join("\r\n"));
}

function buildMimeWithPdf(to, subj, body, pdfB64, filename) {
  const bd = "b_" + Math.random().toString(36).slice(2);
  return b64url([
    `From: ${GMAIL_SENDER}`, `To: ${to}`,
    `Subject: =?UTF-8?B?${btoa(unescape(encodeURIComponent(subj)))}?=`,
    "MIME-Version: 1.0", `Content-Type: multipart/mixed; boundary="${bd}"`, "",
    `--${bd}`, "Content-Type: text/plain; charset=utf-8",
    "Content-Transfer-Encoding: base64", "",
    btoa(unescape(encodeURIComponent(body))), "",
    `--${bd}`, `Content-Type: application/pdf; name="${filename}"`,
    "Content-Transfer-Encoding: base64", `Content-Disposition: attachment; filename="${filename}"`, "",
    pdfB64, "", `--${bd}--`
  ].join("\r\n"));
}

function buildHtmlMime(to, subj, htmlBody) {

    async function sendGmail(to, subj, body, pdfB64=null, filename=null) {
  const token = await getGmailToken();
  const raw = pdfB64 ? buildMimeWithPdf(to, subj, body, pdfB64, filename) : buildMime(to, subj, body);

    method: "POST",
    headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
    body: JSON.stringify({ raw })

  if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || "Erreur Gmail"); }
}

/* ══════════════════════════════════════════════════════
   jsPDF → base64 (chunked, pas de stack overflow)
══════════════════════════════════════════════════════ */
function pdfToBase64(pdf) {
  const ab = pdf.output("arraybuffer");
  const bytes = new Uint8Array(ab);
  let bin = "";
  const chunk = 8192;
  for (let i = 0; i < bytes.length; i += chunk)
    bin += String.fromCharCode(...bytes.subarray(i, i + chunk));
  return btoa(bin);
}

const ROOT = "pf_sessions", ACTIVE = "pf_active";
const getSessions = () => { try { return JSON.parse(localStorage.getItem(ROOT)||"{}"); } catch { return {}; } };
const saveSession = (id, d) => { const a=getSessions(); a[id]=d; localStorage.setItem(ROOT,JSON.stringify(a)); };
const getSession  = (id) => getSessions()[id] || {};
const delSession  = (id) => { const a=getSessions(); delete a[id]; localStorage.setItem(ROOT,JSON.stringify(a)); if(localStorage.getItem(ACTIVE)===id) localStorage.removeItem(ACTIVE); };
const getActive   = ()   => localStorage.getItem(ACTIVE)||null;

/* ══════════════════════════════════════════════════════
   API CLAUDE
══════════════════════════════════════════════════════ */
async function callClaude(key, messages, system) {
  const body = { model: "claude-sonnet-4-6", max_tokens: 2000, messages };
  if (system) body.system = system;
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": key, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content?.map(b=>b.text||"").join("") || "";
}

/* ══════════════════════════════════════════════════════
   LATEX → HTML (KaTeX)
══════════════════════════════════════════════════════ */
function latexToHtml(src) {
  if (!window.katex) return `<pre style="white-space:pre-wrap">${src}</pre>`;
  let h = src
    .replace(/\$\$([\s\S]+?)\$\$/g, (_,m) => { try { return `<div style="margin:10px 0;text-align:center">${katex.renderToString(m,{displayMode:true,throwOnError:false})}</div>`; } catch { return `$$${m}$$`; } })
    .replace(/\$([^\$\n]+?)\$/g, (_,m) => { try { return katex.renderToString(m,{throwOnError:false}); } catch { return `$${m}$`; } });
  h = h
    .replace(/\\begin\{center\}([\s\S]*?)\\end\{center\}/g,'<div style="text-align:center">$1</div>')
    .replace(/\\textbf\{([^}]+)\}/g,'<strong>$1</strong>')
    .replace(/\\textit\{([^}]+)\}/g,'<em>$1</em>')
    .replace(/\{\\Large\\textbf\{([^}]+)\}\}/g,'<h1 style="font-size:16pt;text-align:center;margin:12px 0">$1</h1>')
    .replace(/\\section\*?\{([^}]+)\}/g,'<h2 style="font-size:13pt;margin:16px 0 8px">$1</h2>')
    .replace(/\\subsection\*?\{([^}]+)\}/g,'<h3 style="font-size:12pt;margin:12px 0 6px">$1</h3>')
    .replace(/\\begin\{enumerate\}([\s\S]*?)\\end\{enumerate\}/g,(_,b)=>`<ol style="padding-left:24px;margin:8px 0">${b.replace(/\\item\s+/g,'<li>').replace(/<li>([^<]*)/g,'<li>$1</li>')}</ol>`)
    .replace(/\\begin\{itemize\}([\s\S]*?)\\end\{itemize\}/g,(_,b)=>`<ul style="padding-left:24px;margin:8px 0">${b.replace(/\\item\s+/g,'<li>').replace(/<li>([^<]*)/g,'<li>$1</li>')}</ul>`)
    .replace(/\\hfill/g,'<span style="float:right">')
    .replace(/\\\\(\[[\d.]+pt\])?/g,'<br/>')
    .replace(/\\vspace\{[^}]+\}/g,'<div style="height:8px"></div>')
    .replace(/\\newline/g,'<br/>')
    .replace(/\\hline/g,'')
    .replace(/\\[a-zA-Z]+\{([^}]*)\}/g,'$1')
    .replace(/\\[a-zA-Z]+/g,'')
    .replace(/\n{2,}/g,'</p><p style="margin:5px 0">');
  return '<p style="margin:5px 0">'+h+'</p>';
}

/* ══════════════════════════════════════════════════════
   SESSION MANAGER
══════════════════════════════════════════════════════ */
function SessionManager({onSelect}) {
  const [sessions, setSessions] = useState(()=>getSessions());
  const [name, setName] = useState("");
  const refresh = () => setSessions(getSessions());
  const create  = () => {
    const n = name.trim() || "Devoir du "+new Date().toLocaleDateString("fr-FR");
    const id = newId();
    saveSession(id,{name:n,createdAt:Date.now()});
    setName(""); refresh(); onSelect(id,n);
  };
  const entries = Object.entries(sessions).sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0));
  const lastId  = getActive();
  const last    = lastId && sessions[lastId] ? sessions[lastId] : null;
  return (
    <div style={{maxWidth:700,margin:"0 auto",padding:"2rem 1rem"}}>
      <h1 style={{marginBottom:8}}>📐 Gestionnaire de devoirs</h1>
      <p style={{fontSize:13,color:"#6b7280",marginBottom:"1.5rem"}}>Chaque devoir est indépendant — ouvrez-en plusieurs dans des onglets différents.</p>
      {last && (
        <div style={{background:"#dbeafe",border:"0.5px solid #93c5fd",borderRadius:10,padding:"14px 16px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:12,color:"#1d4ed8",marginBottom:2}}>Dernier devoir ouvert</div><div style={{fontWeight:500}}>{last.name}</div></div>
          <button onClick={()=>onSelect(lastId,last.name)} style={{background:"#1d4ed8",border:"none",flexShrink:0}}>Reprendre →</button>
        </div>
      )}
      <Card>
        <div style={{fontSize:14,fontWeight:500,marginBottom:10}}>➕ Nouveau devoir</div>
        <div style={{display:"flex",gap:8}}>
          <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="Ex : Terminale – Suites – Jan 2025" onKeyDown={e=>e.key==="Enter"&&create()} style={{flex:1}}/>
          <button onClick={create} style={{flexShrink:0}}>Créer</button>
        </div>
      </Card>
      {entries.length>0 && (
        <Card>
          <div style={{fontSize:14,fontWeight:500,marginBottom:10}}>📂 Devoirs existants</div>
          {entries.map(([id,s])=>(
            <div key={id} onClick={()=>onSelect(id,s.name)}
              style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",marginBottom:6,borderRadius:8,cursor:"pointer",background:"#f3f4f6",border:"0.5px solid #e5e7eb"}}
              onMouseEnter={e=>e.currentTarget.style.background="#e5e7eb"}
              onMouseLeave={e=>e.currentTarget.style.background="#f3f4f6"}>
              <div>
                <div style={{fontWeight:500,fontSize:14}}>{s.name}</div>
                <div style={{fontSize:11,color:"#9ca3af"}}>
                  {s.createdAt?new Date(s.createdAt).toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"}):""}
                  {s.step>0?` — Étape ${s.step+1}/4`:""}
                  {s.corrections?.filter(c=>!c.skipped).length>0?` — ${s.corrections.filter(c=>!c.skipped).length} corrigée(s)`:""}
                </div>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontSize:12,color:"#1d4ed8",fontWeight:500}}>Ouvrir →</span>
                <span onClick={e=>{e.stopPropagation();if(window.confirm("Supprimer ?"))delSession(id),refresh();}} style={{fontSize:12,color:"#dc2626",cursor:"pointer",padding:"2px 6px"}}>✕</span>
              </div>
            </div>
          ))}
        </Card>
      )}
      {entries.length===0 && <p style={{textAlign:"center",color:"#9ca3af",fontSize:13,marginTop:"2rem"}}>Aucun devoir — créez-en un ci-dessus.</p>}
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   DEVOIR (logique principale)
══════════════════════════════════════════════════════ */
function Devoir({sid, sname, onBack}) {
  /* Helpers persist */
  const ld  = (k,fb) => { const s=getSession(sid); return s[k]!==undefined?s[k]:fb; };
  const ps  = (k,v)  => { const all=getSessions(); const s=all[sid]||{}; s[k]=v; saveSession(sid,s); };

  /* État global */
  const [apiKey, setApiKey] = useState(()=>{try{return localStorage.getItem("pf_apikey")||"";}catch{return "";}});
  const [step,   setStepR]  = useState(()=>ld("step",0));
  const [busy,   setBusy]   = useState(false);
  const [status, setStatus] = useState("");
  const previewRef = useRef(null);

  const setStep = v => { setStepR(v); ps("step",v); };
  useEffect(()=>{ try{localStorage.setItem("pf_apikey",apiKey);}catch{} },[apiKey]);

  /* Étape 0 – Sujet */
  const [mode,     setModeR]     = useState(()=>ld("mode","generate"));
  const [consignes,setConsR]     = useState(()=>ld("consignes",""));
  const [latex,    setLatexR]    = useState(()=>ld("latex",""));
  const [corrRef,  setCorrRefR]  = useState(()=>ld("corrRef",""));
  const [upName,   setUpNameR]   = useState(()=>ld("upName",""));
  const [upPdf,    setUpPdf]     = useState(null);  // PDF binaire, non persisté

  const setMode     = v => { setModeR(v);     ps("mode",v);     };
  const setConsignes= v => { setConsR(v);     ps("consignes",v);};
  const setLatex    = v => { setLatexR(v);    ps("latex",v);    };
  const setCorrRef  = v => { setCorrRefR(v);  ps("corrRef",v);  };
  const setUpName   = v => { setUpNameR(v);   ps("upName",v);   };

  /* Étape 1 – Diffusion */
  const [students, setStudentsR]  = useState(()=>ld("students",""));
  const [extracting,setExtracting]= useState(false);
  const [copies,   setCopies]     = useState([]);  // [{name,b64}], non persisté
  const setStudents = v => { setStudentsR(v); ps("students",v); };

  /* Étape 2 – Correction */
  const [answers,     setAnswersR]    = useState(()=>ld("answers",{}));
  const [corrections, setCorrectionsR]= useState(()=>ld("corrections",[]));
  const setAnswers     = v => { setAnswersR(v);     ps("answers",v);     };
  const setCorrections = v => { setCorrectionsR(v); ps("corrections",v); };

  /* Étape 3 – Résultats */
  const [mailsDone, setMailsDoneR] = useState(()=>ld("mailsDone",false));
  const setMailsDone = v => { setMailsDoneR(v); ps("mailsDone",v); };

  /* Dérivés */
  const parsedStudents = students.trim().split("\n").filter(Boolean).map((l,i)=>{
    const [n,e]=l.split(",").map(s=>s.trim()); return {id:i,name:n||`Élève ${i+1}`,email:e||""};
  });
  const validCorrs = corrections.filter(c=>!c.skipped);
  const avg = validCorrs.filter(c=>!isNaN(+c.note)).reduce((a,c,_,ar)=>a+(+c.note)/ar.length,0);
  const canNext = [
    mode==="generate"?!!latex:!!upPdf,
    true,
    corrections.length>0,
    true
  ][step];

  /* ── Lecture fichier → base64 ── */
  const readFile = (file) => new Promise(res=>{
    const r=new FileReader(); r.onload=e=>res(e.target.result.split(",")[1]); r.readAsDataURL(file);
  });

  /* ── Extraction noms depuis PDF ── */
  const extractNames = async (b64) => {
    if (!b64||!apiKey) return;
    setExtracting(true);
    try {
      const raw = await callClaude(apiKey, [{role:"user",content:[
        {type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},
        {type:"text",text:"Extrais le nom complet et l'email de chaque élève depuis ces copies.\nJSON uniquement :\n[{\"name\":\"Prénom Nom\",\"email\":\"...\"}]\nSi pas d'email visible, mets \"\"."}
      ]}], "Tu extrais des noms. JSON uniquement.");
      const arr = JSON.parse(raw.replace(/```json|```/g,"").trim());
      setStudents(arr.map(s=>s.email?`${s.name}, ${s.email}`:s.name).join("\n"));
    } catch(e){ console.error("extractNames:",e); }
    finally { setExtracting(false); }
  };

  /* ── Ajout copies PDF ── */
  const addCopies = async (files) => {
    const arr = Array.from(files).filter(f=>f.type==="application/pdf");
    for (const f of arr) {
      const b64 = await readFile(f);
      setCopies(prev=>[...prev,{name:f.name,b64}]);
      if (copies.length===0) extractNames(b64);
    }
  };

  /* ── Génération sujet LaTeX ── */
  const generateSubject = async () => {
    if (!consignes.trim()||!apiKey) return;
    setBusy(true); setStatus("Génération du sujet…");
    try {
      const res = await callClaude(apiKey, [{role:"user",content:
        `Génère un sujet de mathématiques en LaTeX selon ces consignes :\n${consignes}\n\n`+

        `\\vspace{8pt}\\section*{Exercice 1 --- [titre] \\hfill (X pts)}\n`+
        `\\begin{enumerate}\\item Énoncé avec $f(x)=...$\\end{enumerate}\n\n`+
        `---CORRECTION---\n\\section*{Corrigé}\n...`
      }], "Professeur de maths lycée français. LaTeX rigoureux.");
      const sep = res.indexOf("---CORRECTION---");
      setLatex(sep>0?res.slice(0,sep).trim():res);
      setCorrRef(sep>0?res.slice(sep+16).trim():"");
    } catch(e){ setStatus("Erreur : "+e.message); }
    finally { setBusy(false); if(status!=="") setStatus(""); }
  };

  /* ── Téléchargement PDF sujet ── */
  const downloadSubjectPdf = async () => {
    if (!previewRef.current||!window.jspdf) return;
    setBusy(true); setStatus("Génération du PDF…");
    try {
      const {jsPDF} = window.jspdf;
      const el = previewRef.current;
      // Capture via canvas
      const script = document.createElement("script");
      script.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
      if (!window.html2canvas) {
        await new Promise((res,rej)=>{ script.onload=res; script.onerror=rej; document.head.appendChild(script); });
      }
      const canvas = await window.html2canvas(el,{scale:2,useCORS:true,backgroundColor:"#fff"});
      const pdf = new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
      const W=pdf.internal.pageSize.getWidth(), H=pdf.internal.pageSize.getHeight(), m=15;
      const iw=W-m*2; let rem=(canvas.height*iw)/canvas.width, srcY=0;
      while(rem>0){
        const sh=Math.min(rem,H-m*2);
        const sc=document.createElement("canvas"); const r=canvas.width/iw;
        sc.width=canvas.width; sc.height=sh*r;
        sc.getContext("2d").drawImage(canvas,0,srcY*r,canvas.width,sh*r,0,0,canvas.width,sh*r);
        if(srcY>0)pdf.addPage();
        pdf.addImage(sc.toDataURL("image/png"),"PNG",m,m,iw,sh);
        srcY+=sh; rem-=sh;
      }
      pdf.save("sujet_maths.pdf");
    } catch(e){ setStatus("Erreur PDF : "+e.message); }
    finally { setBusy(false); setStatus(""); }
  };

  /* ── Correction depuis PDF ── */
  const correctFromPdf = async () => {

      const allResults = [];
      for (let i=0; i<copies.length; i++) {
        setStatus(`Correction PDF ${i+1}/${copies.length}…`);
        const blocks = [
          ...(mode==="upload"&&upPdf?[{type:"document",source:{type:"base64",media_type:"application/pdf",data:upPdf}}]:[]),
          {type:"document",source:{type:"base64",media_type:"application/pdf",data:copies[i].b64}},
          {type:"text",text:
            `Copies des élèves :\n${parsedStudents.map(s=>`- ${s.name}`).join("\n")}\n\n`+
            `SUJET${mode==="upload"?" (voir PDF joint ci-dessus)":":\n"+latex}\n\n`+
            `CORRIGÉ :\n${corrRef||"[utilise tes connaissances]"}\n\n`+
            `Identifie chaque élève, ses pages dans CE PDF (commençant à 1), corrige.\n`+
            `Tutoie l'élève (tu, ton) et utilise son prénom seul dans appréciation et conseil.\n`+
            `JSON uniquement :\n[{"name":"Prénom Nom","pageStart":1,"pageEnd":2,"note":14,"appreciation":"Prénom, tu...","details":[{"exercice":"Ex 1","obtenu":"7","sur":"10","remarque":"..."}],"conseil":"Tu devrais..."}]`
          }

          "Correcteur bienveillant. Tutoiement, prénom seul. JSON uniquement.");
        const arr = JSON.parse(raw.replace(/```json|```/g,"").trim());
        allResults.push(...arr);
      }
      setCorrections(parsedStudents.map(s=>{
        const f=allResults.find(r=>r.name?.toLowerCase().includes(s.name.split(" ")[0].toLowerCase()));
        return f?{...s,...f}:{...s,skipped:true};

    } catch(e){ setStatus("Erreur : "+e.message); }
    finally { setBusy(false); setStatus(""); }
  };

  /* ── Correction manuelle ── */

            `Corrige cette copie.\nSUJET:\n${latex}\nCORRIGÉ:\n${corrRef||"[utilise tes connaissances]"}\n`+
            `COPIE DE ${s.name} (prénom: ${s.name.split(" ")[0]}):\n${ans}\n`+

        ...(mode==="upload"&&upPdf?[{type:"document",source:{type:"base64",media_type:"application/pdf",data:upPdf}}]:[]),

          `Corrige cette copie en retard.\nSUJET${mode==="upload"?" (voir PDF joint)":":\n"+latex}\n`+
          `CORRIGÉ:\n${corrRef||"[utilise tes connaissances]"}\n`+
          `Tutoie et utilise le prénom seul.\n`+
          `JSON: [{"name":"Prénom Nom","pageStart":1,"pageEnd":1,"note":14,"appreciation":"...","details":[{"exercice":"Ex 1","obtenu":"7","sur":"10","remarque":"..."}],"conseil":"..."}]`

  const exportRecap = () => {
    if (!window.jspdf) return;
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const M=15; let y=M; const PW=180,LH=6;
    const add=(t,o={})=>{ if(y>270){pdf.addPage();y=M;} pdf.setFont("helvetica",o.bold?"bold":"normal"); pdf.setFontSize(o.size||10); pdf.setTextColor(...(o.color||[0,0,0])); const ls=pdf.splitTextToSize(t,PW); pdf.text(ls,M,y); y+=ls.length*LH+(o.after||0); };
    add(`Récapitulatif — ${sname}`,{bold:true,size:14,after:4});
    add(`Moyenne : ${avg.toFixed(1)}/20`,{size:11,color:[80,80,80],after:6});
    validCorrs.forEach(c=>{
      if(y>250){pdf.addPage();y=M;}
      pdf.setDrawColor(200,200,200); pdf.line(M,y,M+PW,y); y+=4;
      const col=!isNaN(+c.note)?(+c.note>=10?[22,163,74]:[220,38,38]):[0,0,0];
      add(`${c.name}  —  ${c.note}/20`,{bold:true,size:12,color:col,after:2});

      (c.details||[]).forEach(d=>add(`• ${d.exercice} : ${d.obtenu}/${d.sur} — ${d.remarque}`,{size:8.5,color:[60,60,60]}));
      if(c.conseil){y+=2;add(`Conseil : ${c.conseil}`,{size:8.5,color:[80,80,180],after:4});}else y+=4;

      ).join("");

      const htmlBody =
        "<h1>Résultats — "+prenom+"</h1>"+

    }
        setMailsDone(true); setBusy(false);
    setStatus(errors.length?`⚠️ Échec : ${errors.join(", ")}`: "");
  };

  /* ══════════════════ RENDU ══════════════════════════ */

      </div>

        </Field>
        {!apiKey&&<p style={{fontSize:12,color:"#dc2626",marginTop:6}}>⚠️ Saisissez votre clé API pour activer l'outil.</p>}
        {apiKey&&<p style={{fontSize:12,color:"#16a34a",marginTop:6}}>✓ Clé partagée entre tous les devoirs.</p>}
      </Card>

      {/* Stepper */}
      <div style={{display:"flex",alignItems:"flex-start",marginBottom:"2rem"}}>

            </div>

        <div style={{display:"flex",gap:8,marginBottom:16}}>

            <DropZone id="copies-step2" multiple={true} loaded={copies.length>0}

              label="Glissez un ou plusieurs PDFs ici ou cliquez"

            {copies.length>0&&(
              <div style={{marginBottom:8}}>
                {copies.map((p,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12,padding:"4px 8px",background:"#f3f4f6",borderRadius:6,marginBottom:4}}>
                    <span>📄 {p.name}</span>
                    <span style={{color:"#dc2626",cursor:"pointer"}} onClick={()=>setCopies(prev=>prev.filter((_,j)=>j!==i))}>✕</span>
                  </div>

          </Card>

        {corrections.length>0&&(<>
          {parsedStudents.map(s=>{
            const c=corrections.find(x=>x.id===s.id);
            const nc=c&&!isNaN(+c.note)?(+c.note>=10?"#16a34a":"#dc2626"):"#111";
            return (
              <Card key={s.id}>

                </div>:null}/>
                {c&&!c.skipped?(<>
                  <p style={{fontSize:13,color:"#6b7280",margin:"0 0 8px"}}>{c.appreciation}</p>
                  {(c.details||[]).map((d,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",borderTop:"0.5px solid #e5e7eb"}}>
                      <span style={{color:"#6b7280"}}>{d.exercice}</span>
                      <span style={{fontWeight:500}}>{d.obtenu}/{d.sur} — {d.remarque}</span>
                    </div>
                  ))}
                  <p style={{fontSize:12,color:"#6b7280",fontStyle:"italic",margin:"8px 0 0"}}>💡 {c.conseil}</p>
                </>):<p style={{fontSize:13,color:"#9ca3af",fontStyle:"italic"}}>Copie non trouvée dans le PDF</p>}
              </Card>
            );
          })}
          {/* Élèves corrigés non dans la liste parsée */}
          {corrections.filter(c=>!parsedStudents.find(s=>s.id===c.id)&&!c.skipped).map(c=>{
            const nc=!isNaN(+c.note)?(+c.note>=10?"#16a34a":"#dc2626"):"#111";
            return (
              <Card key={c.id}>
                <Row title={c.name+" (ajouté)"} right={<span style={{fontSize:22,fontWeight:500,color:nc}}>{c.note}<span style={{fontSize:14,color:"#6b7280"}}>/20</span></span>}/>
                <p style={{fontSize:13,color:"#6b7280",margin:"0 0 8px"}}>{c.appreciation}</p>
                <p style={{fontSize:12,color:"#6b7280",fontStyle:"italic",margin:"8px 0 0"}}>💡 {c.conseil}</p>
              </Card>
            );
          })}
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <button onClick={()=>setCorrections([])} style={{flex:1,background:"#f3f4f6",color:"#374151",border:"0.5px solid #d1d5db"}}>↩ Recommencer</button>
            <button disabled={busy||!apiKey} onClick={()=>document.getElementById("late-pdf").click()} style={{flex:1,background:"#f3f4f6",color:"#1d4ed8",border:"0.5px solid #bfdbfe",fontSize:12}}>➕ Copie en retard</button>
            <input id="late-pdf" type="file" accept="application/pdf" style={{display:"none"}} onChange={e=>{ if(e.target.files[0]) addLate(e.target.files[0]); }}/>
          </div>
        </>)}
      </>)}

      {/* ═══ STEP 3 : Résultats ═══ */}
      {step===3&&(
        <Card>
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            <button onClick={exportCsv} style={{flex:1,fontSize:12,background:"#f3f4f6",color:"#374151",border:"0.5px solid #d1d5db"}}>📊 CSV</button>
            <button onClick={exportRecap} disabled={!window.jspdf} style={{flex:1,fontSize:12,background:"#f3f4f6",color:"#374151",border:"0.5px solid #d1d5db"}}>📄 PDF récap</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:12,marginBottom:16}}>
            {validCorrs.map(c=>{
              const nc=!isNaN(+c.note)?(+c.note>=10?"#16a34a":"#dc2626"):"#6b7280";
              return (
                <div key={c.id} style={{background:"#f3f4f6",borderRadius:8,padding:14,textAlign:"center"}}>
                  <div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>{c.name}</div>
                  <div style={{fontSize:26,fontWeight:500,color:nc}}>{c.note}<span style={{fontSize:14,color:"#6b7280"}}>/20</span></div>
                </div>
              );
            })}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderTop:"0.5px solid #e5e7eb"}}>
            <span style={{fontSize:13,color:"#6b7280"}}>Moyenne de classe</span>
            <span style={{fontSize:18,fontWeight:500}}>{validCorrs.length>0?avg.toFixed(1):"—"}/20</span>
          </div>
          <div style={{background:"#f0fdf4",border:"0.5px solid #86efac",borderRadius:8,padding:"10px 12px",margin:"12px 0",fontSize:12,color:"#166534"}}>
            ✉️ Mails envoyés depuis <strong>maths.perriand@gmail.com</strong> avec le corrigé en pièce jointe.<br/>
            Un écran Google s'ouvrira la première fois.
          </div>
          {busy&&status&&<p style={{textAlign:"center",fontSize:12,color:"#1d4ed8",marginBottom:8}}>⏳ {status}</p>}
          {mailsDone
            ?<div style={{textAlign:"center",padding:"1.5rem"}}>
               <div style={{fontSize:28,marginBottom:8}}>✅</div>
               <span style={{fontWeight:500,color:"#16a34a"}}>Mails envoyés à tous les élèves !</span>
             </div>
            :<button disabled={busy} onClick={sendResults} style={{width:"100%",marginTop:8}}>
               {busy?"…":"📬 Envoyer les résultats"}
             </button>
          }
        </Card>
      )}

      {/* Nav */}
      <div style={{display:"flex",justifyContent:"space-between",marginTop:"1.5rem"}}>
        {step>0?<button style={{background:"#f3f4f6",color:"#374151",border:"0.5px solid #d1d5db"}} disabled={busy} onClick={()=>setStep(step-1)}>← Retour</button>:<div/>}
        {step<3&&<button disabled={!canNext||busy||!apiKey} onClick={()=>setStep(step+1)}>{["Diffuser →","Corriger les copies →","Voir les résultats →"][step]}</button>}
      </div>
      <p style={{textAlign:"center",fontSize:11,color:"#9ca3af",marginTop:"2rem"}}>Powered by Claude (Anthropic)</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
